apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
    release: {{ .Release.Name }}
type: Opaque
stringData:
  bot-token: {{ .Values.telegram.botToken | required "telegram.botToken is required" | quote }}
  database-url: {{ .Values.database.url | required "database.url is required" | quote }}
