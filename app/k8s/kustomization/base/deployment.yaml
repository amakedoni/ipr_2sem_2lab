apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-support-bot
  labels:
    app: telegram-support-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-support-bot
  template:
    metadata:
      labels:
        app: telegram-support-bot
    spec:
      containers:
        - name: bot
          image: telegram-support-bot:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: database-url
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: bot-token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["python", "-c", "import sys; sys.exit(0)"]
            initialDelaySeconds: 10
            periodSeconds: 30
