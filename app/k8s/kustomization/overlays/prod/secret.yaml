# В prod секреты передаются через CI. Этот файл — заглушка для структуры.
# Реальный способ:
#   kubectl create secret generic app-secret -n telegram-prod \
#     --from-literal=bot-token=$BOT_TOKEN \
#     --from-literal=database-url=$DATABASE_URL
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: telegram-prod
type: Opaque
stringData:
  bot-token: "REPLACE_VIA_CI"
  # БД в telegram-demo (межнаймспейс) — FQDN обязателен
  database-url: "postgresql://support_user:REPLACE_VIA_CI@postgres-0.postgres.telegram-demo.svc.cluster.local:5432/support_bot"
